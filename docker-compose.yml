version: "3.9"

services:
  api:
    build: .
    container_name: nba_prediction_api
    ports:
      - "8000:8000"
    environment:
      - PIPELINE_MODE=once
      - STRICT_STARTUP_CHECKS=1
      - DATABASE_URL=postgresql://nba:nba@postgres:5432/nba
    volumes:
      - .:/app
    depends_on:
      - postgres
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]

  scheduler:
    build: .
    container_name: nba_pipeline_scheduler
    environment:
      - PIPELINE_MODE=scheduler
      - STRICT_STARTUP_CHECKS=0
      - DATABASE_URL=postgresql://nba:nba@postgres:5432/nba
    volumes:
      - .:/app
    command: ["python", "scripts/update_pipeline.py"]
    restart: unless-stopped
    depends_on:
      - postgres

  streamlit:
    build: .
    container_name: nba_streamlit_dashboard
    ports:
      - "8501:8501"
    environment:
      # Use the service name 'api' so Docker's internal DNS finds the container
      - API_URL=http://api:8000
    volumes:
      - .:/app
    depends_on:
      - api
    command: ["streamlit", "run", "streamlit_app.py", "--server.port=8501", "--server.address=0.0.0.0"]

  postgres:
    image: postgres:15
    container_name: nba_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nba
      POSTGRES_USER: nba
      POSTGRES_PASSWORD: nba
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: